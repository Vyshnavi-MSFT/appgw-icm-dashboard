                          <p style={{ margin: 0, fontSize: 13, color: "#cbd5e1", lineHeight: 1.65 }}>{a.insight}</p>
                        </div>
                        <div style={{ padding: "16px 20px" }}>
                          <div style={{ fontSize: 10, color: "#64748b", fontWeight: 700, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>✅ Recommended Action</div>
                          <p style={{ margin: 0, fontSize: 13, color: "#cbd5e1", lineHeight: 1.65 }}>{a.action}</p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── ENG ACTIONS ── */}
            {activeTab === "eng" && (
              <div>
                <div style={{ background: "#1e293b", borderRadius: 10, padding: 20, border: "1px solid #334155", marginBottom: 20 }}>
                  <h3 style={{ margin: "0 0 8px", fontSize: 15, fontWeight: 600, color: "#f1f5f9" }}>⚙️ CRI Recommendations for Engineering Managers</h3>
                  <p style={{ margin: 0, fontSize: 13, color: "#94a3b8", lineHeight: 1.65 }}>Platform fixes, infrastructure investments, and observability gaps that engineering teams should prioritize to reduce ICM recurrence. Top priorities: HTTP/2 self-service limits, AGIC graceful reload, and the routing rule priority bug.</p>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  {ENG_ACTIONS.map(a => (
                    <div key={a.area} style={{ background: "#1e293b", borderRadius: 12, border: `1px solid ${a.color}44`, overflow: "hidden" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 20px", borderBottom: "1px solid #334155" }}>
                        <div style={{ background: `${a.color}22`, border: `1px solid ${a.color}`, borderRadius: 6, padding: "4px 12px", fontSize: 12, fontWeight: 800, color: a.color }}>{a.priority}</div>
                        <h4 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: "#f1f5f9" }}>{a.area}</h4>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr" }}>
                        <div style={{ padding: "16px 20px", borderRight: "1px solid #334155" }}>
                          <div style={{ fontSize: 10, color: "#64748b", fontWeight: 700, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>🔍 Pattern Observed</div>
                          <p style={{ margin: 0, fontSize: 13, color: "#cbd5e1", lineHeight: 1.65 }}>{a.insight}</p>
                        </div>
                        <div style={{ padding: "16px 20px" }}>
                          <div style={{ fontSize: 10, color: "#64748b", fontWeight: 700, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>🛠️ Engineering Action</div>
                          <p style={{ margin: 0, fontSize: 13, color: "#cbd5e1", lineHeight: 1.65 }}>{a.action}</p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ICMDashboard />);
  </script>
</body>
</html>
